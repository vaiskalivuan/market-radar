<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🗂️ Hahow 市場雷達報告 — 每週彙整</title>
<style>
  :root {
    --teal: #0ADAB2;
    --navy: #1F497D;
    --orange: #FA8D0B;
    --dark-navy: #0d2b4e;
    --bg: #f5f7fa;
    --card-bg: #ffffff;
    --mint-bg: #eefaf7;
    --text: #333;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); }
  .header {
    background: linear-gradient(135deg, var(--dark-navy) 0%, var(--navy) 100%);
    color: white;
    padding: 40px 32px 32px;
    text-align: center;
  }
  .header h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 8px; }
  .header p { font-size: 0.95rem; opacity: 0.85; }
  .container { max-width: 820px; margin: 0 auto; padding: 32px 20px; }
  .week-card {
    background: var(--card-bg);
    border-radius: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    margin-bottom: 24px;
    overflow: hidden;
  }
  .week-header {
    background: var(--navy);
    color: white;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .week-header .date { font-size: 1.1rem; font-weight: 700; }
  .week-header .label { font-size: 0.8rem; opacity: 0.75; background: rgba(255,255,255,0.15); padding: 2px 10px; border-radius: 20px; }
  .week-body { padding: 20px 24px; display: flex; gap: 16px; flex-wrap: wrap; }
  .report-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 20px;
    border-radius: 10px;
    text-decoration: none;
    font-weight: 600;
    font-size: 0.92rem;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .report-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
  .btn-team {
    background: var(--teal);
    color: var(--dark-navy);
  }
  .btn-vais {
    background: var(--orange);
    color: white;
  }
  footer {
    text-align: center;
    padding: 32px;
    color: #888;
    font-size: 0.85rem;
  }
</style>
</head>
<body>

<div class="header">
  <h1>🗂️ Hahow 市場雷達報告</h1>
  <p>每週課程開發人選動態彙整 · 自動發布</p>
</div>

<div class="container">

  <div class="week-card">
    <div class="week-header">
      <span class="date">📅 2026-03-23</span>
      <span class="label">Week 1</span>
    </div>
    <div class="week-body">
      <a class="report-btn btn-team" href="reports/market-radar-team-2026-03-23.html" target="_blank">
        👥 全團隊版
      </a>
      <a class="report-btn btn-vais" href="reports/market-radar-vais-2026-03-23.html" target="_blank">
        🪞 Vais 個人版
      </a>
    </div>
  </div>

</div>

<footer>
  <p>由 Vais 的 AI 助理自動生成 · Hahow 課程開發團隊內部使用</p>
</footer>

</body>
</html>
