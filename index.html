<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>冒聼聯隆 Hahow 氓赂聜氓聽麓茅聸路茅聛聰</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, 'Noto Sans TC', sans-serif;
      background: #f0faf8;
      color: #333;
      min-height: 100vh;
    }
    header {
      background: linear-gradient(135deg, #1F497D 0%, #0ADAB2 100%);
      color: white;
      padding: 40px 24px 32px;
      text-align: center;
    }
    header h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }
    header p {
      opacity: 0.85;
      font-size: 0.95rem;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 32px 24px;
    }
    .section-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #1F497D;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 2px solid #0ADAB2;
    }
    .report-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 40px;
    }
    .report-card {
      background: white;
      border-radius: 12px;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      border-left: 4px solid #0ADAB2;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .report-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(10,218,178,0.15);
    }
    .report-card a {
      text-decoration: none;
      color: #1F497D;
      font-weight: 600;
      font-size: 1rem;
    }
    .report-card .date {
      font-size: 0.85rem;
      color: #888;
    }
    .badge {
      background: #0ADAB2;
      color: #1F497D;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .badge.latest {
      background: #FA8D0B;
      color: white;
    }
    .empty {
      text-align: center;
      color: #aaa;
      padding: 40px;
    }
    footer {
      text-align: center;
      padding: 24px;
      font-size: 0.8rem;
      color: #aaa;
    }
  </style>
</head>
<body>
  <header>
    <h1>冒聼聯隆 Hahow 氓赂聜氓聽麓茅聸路茅聛聰</h1>
    <p>忙炉聫茅聙卤盲赂聙猫聡陋氓聥聲莽聰垄氓聡潞茂录聦忙露碌猫聯聥忙聨聮猫隆聦忙娄聹茫聙聛莽陇戮莽戮陇莽聠卤猫颅掳茫聙聛盲潞潞茅聛赂氓聥聲忙聟聥猫聢聡茅庐颅茅颅職忙漏聼忙聹聝</p>
  </header>

  <div class="container">
    <div class="section-title">冒聼聯聥 氓聟篓氓聹聵茅職聤莽聣聢氓聽卤氓聭聤</div>
    <div class="report-list" id="team-reports">
      <div class="empty">猫录聣氓聟楼盲赂颅...</div>
    </div>
  </div>

  <footer>猫聡陋氓聥聲莽聰垄氓聡潞 by Claude 脗路 Hahow 猫陋虏莽篓聥茅聳聥莽聶录氓聹聵茅職聤</footer>

  <script>
    // 氓路虏莽聼楼莽職聞氓聽卤氓聭聤忙赂聟氓聳庐茂录聢忙炉聫忙卢隆忙聳掳氓垄聻氓聽卤氓聭聤氓戮聦猫聡陋氓聥聲忙聸麓忙聳掳茂录聣
    const reports = [
      "2026-03-30",
      "2026-03-24",
      "2026-03-23",
    ];

    const container = document.getElementById('team-reports');
    container.innerHTML = '';

    if (reports.length === 0) {
      container.innerHTML = '<div class="empty">莽聸庐氓聣聧氓掳職莽聞隆氓聽卤氓聭聤</div>';
    } else {
      reports.forEach((date, index) => {
        const card = document.createElement('div');
        card.className = 'report-card';
        const isLatest = index === 0;
        card.innerHTML = `
          <div>
            <a href="reports/market-radar-team-${date}.html">冒聼聯聤 氓赂聜氓聽麓茅聸路茅聛聰 芒聙聰 ${date} 氓聟篓氓聹聵茅職聤莽聣聢</a>
            <div class="date">${date}</div>
          </div>
          ${isLatest ? '<span class="badge latest">忙聹聙忙聳掳</span>' : '<span class="badge">忙颅路氓聫虏</span>'}
        `;
        container.appendChild(card);
      });
    }
  </script>
</body>
</html>
